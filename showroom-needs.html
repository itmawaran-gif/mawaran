<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نواقص Showroom Store</title>
  <style>
    /* تصميم متجاوب (Mobile-First) */
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 15px;
      color: #333;
    }
    h2 {
      text-align: center;
      color: #2c3e50;
      font-size: 1.5em;
    }
    .card {
      background: #ffffff;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      cursor: pointer;
      border: 1px solid #e1e4e8;
      transition: background-color 0.2s;
    }
    .card:active { background-color: #f8f9fa; }
    
    .product-header {
      font-weight: bold;
      font-size: 1.1em;
      margin-bottom: 8px;
      color: #1a1a1a;
    }
    .product-code {
      font-size: 0.85em;
      color: #666;
      background: #eee;
      padding: 2px 6px;
      border-radius: 4px;
      margin-right: 8px;
    }
    
    .summary-stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.95em;
      padding-top: 8px;
      border-top: 1px dashed #eee;
    }
    .showroom-alert {
      color: #d32f2f; /* لون أحمر للتنبيه */
      font-weight: bold;
    }
    .other-stores {
      color: #2e7d32;
    }

    /* قسم التفاصيل المخفي افتراضياً */
    .details-panel {
      display: none;
      margin-top: 12px;
      background: #f8f9fa;
      border-radius: 6px;
      padding: 10px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 0.9em;
      border-bottom: 1px solid #eaeaea;
    }
    .detail-row:last-child { border-bottom: none; }
    
    .loading { text-align: center; padding: 20px; font-weight: bold; color: #555; }
  </style>
</head>
<body>

  <h2>نواقص Showroom Store</h2>
  <div id="data-container">
    <div class="loading">جاري جلب البيانات من المستودع...</div>
  </div>

 <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyqPqnpC-sbFuduQJvT34clNjrSCfnxY6XdPWj4qvP73MzEttuZFETWVnrzFj7OFvJvWQ/exec';

    async function fetchData() {
      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error('Network response was not ok');
        const data = await response.json();
        renderProducts(data);
      } catch (error) {
        console.error("Error:", error);
        document.getElementById('data-container').innerHTML = 
          `<div class="loading" style="color:red;">
            حدث خطأ في الاتصال.<br>
            <small>تأكد من عمل Deploy كـ Anyone وتحديث الرابط.</small>
          </div>`;
      }
    }

function renderProducts(products) {
      const container = document.getElementById('data-container');
      container.innerHTML = ''; 

      if (products.length === 0) {
        container.innerHTML = '<div class="loading">لا توجد نواقص حالياً (أو لا يوجد رصيد كافٍ في المستودعات الأخرى).</div>';
        return;
      }

      // --- الترتيب: من الأعلى رصيداً في المستودعات الأخرى إلى الأقل ---
      products.sort((a, b) => b.otherQty - a.otherQty);

      products.forEach(product => {
        const card = document.createElement('div');
        card.className = 'card';
        
        // ترتيب تفاصيل المستودعات داخل البطاقة (الأعلى رصيداً أولاً)
        const detailsHtml = product.details
          .sort((a, b) => b.qty - a.qty)
          .map(d => `
            <div class="detail-row" style="${d.store === 'Showroom Store' ? 'color: #d32f2f; font-weight: bold; background: #fff1f1;' : ''}">
              <span>${d.store}</span>
              <strong>${d.qty} قطع</strong>
            </div>
          `).join('');

        card.innerHTML = `
          <div class="product-header">
            ${product.name}
            <div style="font-size: 0.75em; color: #555; margin-top: 4px;">
                <span style="background:#e8f0fe; padding:2px 5px; border-radius:3px;">الرمز: ${product.code}</span>
            </div>
          </div>
          <div class="summary-stats">
            <span class="showroom-alert">المعرض: ${product.showroomQty}</span>
            <span class="other-stores" style="background: #e6ffed; padding: 2px 8px; border-radius: 12px;">
                المتوفر للنقل: <strong>${product.otherQty}</strong>
            </span>
          </div>
          <div class="details-panel">
            <div style="font-size: 0.8em; color: #888; border-bottom: 1px solid #ddd; margin-bottom: 5px; padding-bottom: 3px;">توزيع الكميات في الفروع:</div>
            ${detailsHtml}
          </div>
        `;

        card.onclick = function() {
          const panel = this.querySelector('.details-panel');
          panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        };

        container.appendChild(card);
      });
    }
    fetchData();
</script>

</body>
</html>
