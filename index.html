<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MAWARAN">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<title>MAWARAN Store</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
:root{
  --bg:      #f1f5f9;
  --surface: #ffffff;
  --header:  #0f172a;
  --accent:  #f59c0a;
  --blue:    #0ea5e9;
  --green:   #10b981;
  --text:    #1e293b;
  --muted:   #64748b;
  --border:  #e2e8f0;
  --r:       14px;
  --sh:      0 2px 14px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:-webkit-fill-available}
body{
  font-family:'IBM Plex Sans Arabic',Tahoma,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  min-height:-webkit-fill-available;
  display:flex;flex-direction:column;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}

/* HEADER */
.app-header{
  background:var(--header);
  padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;flex-shrink:0;
}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:36px;height:36px;background:var(--accent);border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:800;color:var(--header);flex-shrink:0;
}
.logo-text{display:flex;flex-direction:column;line-height:1}
.logo-name{font-size:16px;font-weight:700;color:#fff;letter-spacing:.4px}
.logo-sub{font-size:11px;color:#94a3b8;margin-top:2px}
#installBtn{
  display:none;background:var(--accent);color:var(--header);
  border:none;border-radius:8px;padding:7px 12px;
  font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;
}
#installBtn.show{display:block}

/* iOS BANNER */
#iosBanner{
  display:none;background:#1e3a5f;color:#fff;
  padding:10px 14px;align-items:center;gap:10px;flex-shrink:0;
}
#iosBanner.show{display:flex}
.ios-text{flex:1;font-size:12px;line-height:1.6;color:#cbd5e1}
.ios-text strong{display:block;font-size:13px;color:var(--accent);margin-bottom:2px}
.ios-close{background:none;border:none;color:#94a3b8;font-size:20px;cursor:pointer;padding:2px 6px}

/* SCROLL */
.scroll-area{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:12px 14px 24px;
}
.inner{
  max-width:480px;margin:0 auto;
  display:flex;flex-direction:column;gap:12px;
}

/* CARDS */
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh)}
.search-card{padding:14px}
.section-label{
  font-size:11px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:9px;display:block;
}

/* Search input wrapper – needed for dropdown positioning */
.input-wrap{position:relative;margin-bottom:10px}

#searchInput{
  width:100%;padding:14px;font-size:16px;font-family:inherit;
  border:1.5px solid var(--border);border-radius:10px;
  background:#f8fafc;color:var(--text);outline:none;transition:border .2s;
  display:block;
}
#searchInput:focus{border-color:var(--blue);background:#fff}

/* ── SUGGESTIONS DROPDOWN ── */
#suggestDrop{
  position:absolute;
  top:calc(100% + 4px);
  left:0;right:0;
  background:var(--surface);
  border:1.5px solid var(--blue);
  border-radius:12px;
  box-shadow:0 8px 28px rgba(14,165,233,.18);
  z-index:500;
  overflow:hidden;
  display:none;
  animation:dropIn .18s ease;
}
#suggestDrop.open{display:block}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

.sug-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 14px;
  cursor:pointer;
  border-bottom:1px solid var(--border);
  transition:background .12s;
  gap:8px;
}
.sug-item:last-child{border-bottom:none}
.sug-item:active,.sug-item:hover{background:#eff6ff}
.sug-name{font-size:14px;font-weight:600;color:var(--text);flex:1;line-height:1.4}
.sug-name em{
  font-style:normal;
  color:var(--blue);
  background:#dbeafe;
  border-radius:4px;
  padding:0 2px;
}
.sug-code{font-size:11px;color:var(--muted);background:var(--bg);
  border-radius:6px;padding:3px 7px;flex-shrink:0;font-weight:500}

.sug-loading{
  padding:14px;text-align:center;
  font-size:13px;color:var(--muted);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.spin{
  width:14px;height:14px;border:2px solid var(--border);
  border-top-color:var(--blue);border-radius:50%;
  animation:spin .7s linear infinite;display:inline-block;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Buttons row below input */
.search-btns{display:flex;gap:8px}
.btn-ico{
  flex:1;height:52px;border:none;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;transition:opacity .15s;
  font-family:inherit;font-weight:600;color:#fff;gap:6px;
}
.btn-ico:active{opacity:.75}
.btn-search{background:var(--blue);font-size:15px}
.btn-cam{background:var(--header);font-size:15px}

/* CAMERA */
#cameraWrap{
  border-radius:var(--r);
  overflow:hidden;
  background:#000;
  display:none !important;
}
#cameraWrap.open{display:block !important}
#cameraContainer{width:100%}
.btn-cancel-cam{
  width:100%;padding:12px;background:#334155;color:#fff;
  border:none;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;
}

/* RESULT */
.result-card{overflow:hidden}
.res-header{background:var(--header);padding:14px 16px;color:#fff}
.res-name{font-size:18px;font-weight:700;line-height:1.3}
.res-code{font-size:12px;color:#94a3b8;margin-top:3px}
.usage-box{
  margin:12px 16px 0;background:#fffbeb;border:1px solid #fcd34d;
  border-radius:9px;padding:9px 12px;font-size:13px;color:#92400e;
  display:flex;gap:8px;align-items:flex-start;
}
.prices-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px}
.price-chip{background:var(--bg);border-radius:10px;padding:10px;text-align:center}
.price-chip .lbl{font-size:11px;color:var(--muted);font-weight:500}
.price-chip .val{font-size:20px;font-weight:700;margin-top:3px}
.price-chip.single .val{color:var(--green)}
.price-chip.wholesale .val{color:var(--blue)}
.stock-hdr{
  padding:8px 16px;font-size:11px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;
  border-top:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.stock-badge{
  background:var(--header);color:#fff;
  border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600;
}
.stock-table{width:100%;border-collapse:collapse}
.stock-table td{padding:10px 16px;font-size:14px;border-top:1px solid var(--border)}
.stock-table td:last-child{text-align:left;font-weight:600}
.wh-name{color:var(--muted)}

/* FORM */
.form-card{padding:16px}
.form-title{
  font-size:12px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;
}
.form-fields{display:flex;flex-direction:column;gap:10px}
.field{display:flex;flex-direction:column;gap:5px;width:100%}
.field label{font-size:13px;color:var(--muted);font-weight:600}
.field input{
  width:100%;padding:14px;font-size:16px;font-family:inherit;
  border:1.5px solid var(--border);border-radius:9px;
  background:#f8fafc;color:var(--text);outline:none;transition:border .2s;
  display:block;
}
.field input:focus{border-color:var(--blue);background:#fff}
.field input[readonly]{color:var(--muted);background:#f1f5f9}
.btn-send{
  width:100%;padding:16px;font-size:17px;font-weight:700;font-family:inherit;
  background:var(--green);color:#fff;border:none;border-radius:10px;
  cursor:pointer;margin-top:2px;transition:opacity .15s;
}
.btn-send:active{opacity:.8}
.btn-send:disabled{background:#94a3b8}

/* STATES */
.state-box{padding:36px 16px;text-align:center}
.state-box .ico{font-size:44px;margin-bottom:10px}
.state-box p{color:var(--muted);font-size:15px}
.state-box.err p{color:#ef4444}

.result-card,.form-card{animation:up .22s ease}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<header class="app-header">
  <div class="logo">
    <div class="logo-icon">M</div>
    <div class="logo-text">
      <span class="logo-name">MAWARAN CO</span>
      <span class="logo-sub">Inventory Store</span>
    </div>
  </div>
  <button id="installBtn" onclick="triggerInstall()">Install</button>
</header>

<div id="iosBanner">
  <div style="font-size:26px;flex-shrink:0">📲</div>
  <div class="ios-text">
    <strong>Install the App</strong>
    Tap <strong>Share ↑</strong> then select <strong>"Add to Home Screen"</strong>
  </div>
  <button class="ios-close" onclick="closeBanner()">✕</button>
</div>

<div class="scroll-area">
<div class="inner">

  <div class="card search-card">
    <span class="section-label">🔎 Search by code, barcode or name</span>

    <div class="input-wrap">
      <input id="searchInput" type="text" placeholder="Enter code or product name..." autocomplete="off">
      <!-- Suggestions dropdown -->
      <div id="suggestDrop"></div>
    </div>

    <div class="search-btns">
      <button class="btn-ico btn-search" id="searchBtn">🔍 Search</button>
      <button class="btn-ico btn-cam"    id="camBtn">📷 Camera</button>
    </div>
  </div>

  <div id="cameraWrap" class="card">
    <div id="cameraContainer"></div>
    <button class="btn-cancel-cam" onclick="stopCamera()">✕ Cancel Camera</button>
  </div>

  <div id="result"></div>

</div>
</div>

<script>

/* ══ Service Worker (blob) ══ */
if("serviceWorker" in navigator){
  const code = `
    const V="mawaran-v2";
    self.addEventListener("install",()=>self.skipWaiting());
    self.addEventListener("activate",e=>e.waitUntil(clients.claim()));
    self.addEventListener("fetch",e=>{
      if(e.request.method!=="GET")return;
      e.respondWith(
        caches.open(V).then(c=>
          c.match(e.request).then(r=>
            r||(fetch(e.request).then(nr=>{c.put(e.request,nr.clone());return nr}).catch(()=>r))
          )
        )
      );
    });`;
  const blob = new Blob([code],{type:"application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

/* ══ MAIN ══ */
const API = "https://script.google.com/macros/s/AKfycbwIMkvRzzkr4k_WF2mWULj_OuiwOVIlMd5tufoWk_jfL1H7-MC9U0EA9xO-tyhtp50j4Q/exec";
const searchInput  = document.getElementById("searchInput");
const suggestDrop  = document.getElementById("suggestDrop");
const resultDiv    = document.getElementById("result");
const cameraWrap   = document.getElementById("cameraWrap");
let scanner        = null;
let isSending      = false;
let deferredPrompt = null;
let suggestTimer   = null;
let lastSugQuery   = "";

/* ══ Install ══ */
window.addEventListener("beforeinstallprompt", e=>{
  e.preventDefault(); deferredPrompt=e;
  document.getElementById("installBtn").classList.add("show");
});
window.addEventListener("appinstalled",()=>{
  deferredPrompt=null;
  document.getElementById("installBtn").classList.remove("show");
});
function triggerInstall(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{
    deferredPrompt=null;
    document.getElementById("installBtn").classList.remove("show");
  });
}

/* ══ iOS banner ══ */
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = navigator.standalone===true
  || window.matchMedia("(display-mode:standalone)").matches;
if(isIOS && !isStandalone && !sessionStorage.bannerDone)
  document.getElementById("iosBanner").classList.add("show");
function closeBanner(){
  document.getElementById("iosBanner").classList.remove("show");
  sessionStorage.bannerDone="1";
}

/* ══ Focus helper ══ */
function focusNoKB(){
  searchInput.setAttribute("readonly","true");
  searchInput.focus();
  setTimeout(()=>searchInput.removeAttribute("readonly"),60);
}
window.onload=focusNoKB;

/* ══ Close dropdown when clicking outside ══ */
document.addEventListener("pointerdown", e=>{
  if(!suggestDrop.contains(e.target) && e.target!==searchInput){
    closeDrop();
  }
});

/* ══ Highlight matched part ══ */
function highlight(text, query){
  // Strip spaces for matching position, but highlight in original text
  const tLow  = text.toLowerCase().replace(/\s+/g,"");
  const qLow  = query.toLowerCase().replace(/\s+/g,"");
  const idx   = tLow.indexOf(qLow);
  if(idx < 0) return text;

  // Map stripped index back to original string
  let si=0, start=-1, end=-1, count=0;
  for(let i=0;i<text.length;i++){
    if(text[i].trim()==="") continue;
    if(count===idx) start=i;
    if(count===idx+qLow.length-1) end=i;
    count++;
    si++;
  }
  if(start<0||end<0) return text;
  return text.slice(0,start)
    + `<em>${text.slice(start,end+1)}</em>`
    + text.slice(end+1);
}

/* ══ Show / Close dropdown ══ */
function closeDrop(){ suggestDrop.classList.remove("open"); suggestDrop.innerHTML=""; }

function showDrop(html){
  suggestDrop.innerHTML=html;
  suggestDrop.classList.add("open");
}

/* ══ Live suggestions while typing ══ */
searchInput.addEventListener("input", ()=>{
  const q = searchInput.value.trim();

  if(q.length < 2){
    closeDrop();
    clearTimeout(suggestTimer);
    return;
  }

  if(q === lastSugQuery) return;

  clearTimeout(suggestTimer);

  // Show loading spinner immediately
  showDrop(`<div class="sug-loading"><span class="spin"></span> Searching...</div>`);

  suggestTimer = setTimeout(()=> fetchSuggestions(q), 320);
});

async function fetchSuggestions(q){
  lastSugQuery = q;
  try{
    const res  = await fetch(`${API}?suggest=1&code=${encodeURIComponent(q)}`);
    const data = await res.json();

    // If the query changed while we were fetching, ignore old result
    if(q !== lastSugQuery) return;

    if(!data.suggestions || data.suggestions.length===0){
      closeDrop(); return;
    }

    let html="";
    data.suggestions.forEach(s=>{
      const hName = highlight(s.name, q);
      html += `<div class="sug-item" onpointerdown="pickSuggestion('${esc(s.code)}')">
        <span class="sug-name">${hName}</span>
        <span class="sug-code">${s.code}</span>
      </div>`;
    });
    showDrop(html);
  }catch(e){
    closeDrop();
  }
}

function esc(str){ return str.replace(/\\/g,"\\\\").replace(/'/g,"\\'"); }

function pickSuggestion(code){
  closeDrop();
  searchInput.value = code;
  searchStock(code);
}

/* ══ Search on Enter / button ══ */
searchInput.addEventListener("keydown", e=>{
  if(e.key==="Enter"){ closeDrop(); doSearch(); }
  if(e.key==="Escape"){ closeDrop(); }
});
document.getElementById("searchBtn").onclick = ()=>{ closeDrop(); doSearch(); };
document.getElementById("camBtn").onclick    = openCamera;
function doSearch(){ searchStock(searchInput.value.trim()); }

/* ── Full Search ── */
async function searchStock(code){
  if(!code) return;
  stopCamera();
  lastSugQuery = "";

  resultDiv.innerHTML=`<div class="card"><div class="state-box"><div class="ico">⏳</div><p>Searching...</p></div></div>`;
  try{
    const res  = await fetch(`${API}?code=${encodeURIComponent(code)}`);
    const data = await res.json();

    if(!data?.items?.length){
      resultDiv.innerHTML=`<div class="card"><div class="state-box err"><div class="ico">❌</div><p>No data found for this code</p></div></div>`;
      resetInput(); return;
    }

    let total=0;
    data.items.forEach(i=>total+=Number(i.balance)||0);

    let html=`<div class="card result-card">
      <div class="res-header">
        <div class="res-name">${data.name}</div>
        <div class="res-code">Code: ${code.toUpperCase()}</div>
      </div>`;

    if(data.usage)
      html+=`<div class="usage-box"><span>📋</span><span>${data.usage}</span></div>`;

    html+=`<div style="padding:16px;text-align:center">
      <div style="font-size:28px;font-weight:700;color:var(--green)">${data.price_single} $</div>
    </div>
    <div class="stock-hdr"><span>Warehouses</span><span class="stock-badge">📦 ${total}</span></div>
    <table class="stock-table">`;

    data.items.forEach(i=>{
      html+=`<tr><td class="wh-name">${i.warehouse}</td><td>${i.balance}</td></tr>`;
    });

    html+=`</table></div>
    <div class="card form-card">
      <div class="form-title">📤 Add Movement</div>
      <div class="form-fields">
        <div class="field"><label>Code</label><input id="f_code" value="${data.form_code}" readonly></div>
        <div class="field"><label>Quantity</label><input id="f_qty" type="number" inputmode="numeric" placeholder="0"></div>
        <div class="field"><label>Price</label><input id="f_price" type="number" inputmode="decimal" placeholder="0.00"></div>
        <button class="btn-send" onclick="sendForm(event)">📤 Send</button>
        <div style="text-align:center;margin-top:10px;font-size:12px;color:var(--muted)">
          Last Price: <span style="color:var(--blue)">${data.price_wholesale} $</span>
        </div>
      </div>`;

    resultDiv.innerHTML=html;
    resetInput();
  }catch(err){
    resultDiv.innerHTML=`<div class="card"><div class="state-box err"><div class="ico">⚠️</div><p>Connection error</p></div></div>`;
    resetInput();
  }
}

function resetInput(){ searchInput.value=""; lastSugQuery=""; setTimeout(focusNoKB,40); }
function resetAll(){ resultDiv.innerHTML=""; searchInput.value=""; lastSugQuery=""; stopCamera(); closeDrop(); setTimeout(focusNoKB,100); }

/* ── Camera (robust 3-strategy) ── */
async function openCamera(){
  await stopCamera();
  cameraWrap.classList.add("open");
  scanner = new Html5Qrcode("cameraContainer");
  const cfg = { fps:12, qrbox:{width:230,height:230}, aspectRatio:1.0 };
  const onScan = txt=>{ stopCamera(); searchStock(txt); };

  try{ await scanner.start({facingMode:"environment"}, cfg, onScan); return; }catch(e1){}

  let cams=[];
  try{ cams = await Html5Qrcode.getCameras(); }catch(e){}
  if(cams.length){
    const back = cams.find(c=>/back|rear|environment|خلفي/i.test(c.label))
                || cams[cams.length-1];
    try{ await scanner.start(back.id, cfg, onScan); return; }catch(e2){}
    for(let i=cams.length-1;i>=0;i--){
      try{ await scanner.start(cams[i].id, cfg, onScan); return; }catch(e){}
    }
  }

  stopCamera();
  alert("⚠️ Could not open camera.\nPlease allow camera permission in your browser settings.");
}

async function stopCamera(){
  cameraWrap.classList.remove("open");
  if(scanner){
    try{ await scanner.stop(); }catch(e){}
    scanner=null;
  }
  document.getElementById("cameraContainer").innerHTML="";
}

/* ── Send ── */
async function sendForm(e){
  if(isSending) return;
  const qty   = document.getElementById("f_qty")?.value;
  const price = document.getElementById("f_price")?.value;
  const code  = document.getElementById("f_code")?.value;
  const btn   = e.target;
  if(!qty||!price){alert("⚠️ Please enter quantity and price");return;}
  isSending=true; btn.disabled=true; btn.innerText="⏳ Sending...";
  try{
    await fetch(API,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({code,qty,price})});
    alert("✅ Sent successfully!");
    resetAll();
  }catch(err){
    alert("❌ Send failed, please try again");
    btn.disabled=false; btn.innerText="📤 Send";
  }finally{ isSending=false; }
}
</script>
</body>
</html>
