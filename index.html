<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MAWARAN Store">
<meta name="theme-color" content="#0f172a">
<title>MAWARAN Store</title>

<!-- Apple Touch Icon (SVG → base64) -->
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMjAgMTIwIj48cmVjdCB3aWR0aD0iMTIwIiBoZWlnaHQ9IjEyMCIgcng9IjI0IiBmaWxsPSIjMGYxNzJhIi8+PHRleHQgeD0iNjAiIHk9IjQ1IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LXNpemU9IjMyIiBmb250LWZhbWlseT0iQXJpYWwiIGZpbGw9IiNmNTljMGEiPk08L3RleHQ+PHRleHQgeD0iNjAiIHk9Ijc4IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LXNpemU9IjEyIiBmb250LWZhbWlseT0iQXJpYWwiIGZpbGw9IiM5NGEzYjgiPk1BV0FSQU48L3RleHQ+PHRleHQgeD0iNjAiIHk9Ijk1IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LXNpemU9IjExIiBmb250LWZhbWlseT0iQXJpYWwiIGZpbGw9IiM5NGEzYjgiPlN0b3JlPC90ZXh0Pjwvc3ZnPg==">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
  :root{
    --bg:        #f1f5f9;
    --surface:   #ffffff;
    --header:    #0f172a;
    --accent:    #f59c0a;
    --accent2:   #0ea5e9;
    --green:     #10b981;
    --text:      #1e293b;
    --muted:     #64748b;
    --border:    #e2e8f0;
    --radius:    14px;
    --shadow:    0 2px 12px rgba(0,0,0,.08);
  }

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

  body{
    font-family:'IBM Plex Sans Arabic',Tahoma,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100dvh;
    display:flex;
    flex-direction:column;
  }

  /* ===== HEADER ===== */
  .app-header{
    background:var(--header);
    padding:14px 16px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:100;
  }
  .logo{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .logo-icon{
    width:38px;height:38px;
    background:var(--accent);
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;font-weight:700;color:var(--header);
    flex-shrink:0;
  }
  .logo-text{display:flex;flex-direction:column;line-height:1}
  .logo-name{font-size:17px;font-weight:700;color:#fff;letter-spacing:.5px}
  .logo-sub{font-size:11px;color:#94a3b8;font-weight:400;margin-top:2px}

  /* install btn in header */
  #installBtn{
    display:none;
    background:var(--accent);
    color:var(--header);
    border:none;
    border-radius:8px;
    padding:7px 12px;
    font-size:12px;
    font-weight:600;
    font-family:inherit;
    cursor:pointer;
    gap:5px;
    align-items:center;
  }
  #installBtn.visible{display:flex}

  /* ===== INSTALL BANNER ===== */
  #installBanner{
    display:none;
    background:linear-gradient(135deg,#0f172a,#1e3a5f);
    color:#fff;
    padding:12px 16px;
    align-items:center;
    gap:10px;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  #installBanner.visible{display:flex}
  .banner-icon{font-size:28px;flex-shrink:0}
  .banner-text{flex:1;font-size:13px;line-height:1.5}
  .banner-text strong{display:block;font-size:14px;color:var(--accent)}
  .banner-close{
    background:none;border:none;color:#94a3b8;
    font-size:20px;cursor:pointer;padding:0 4px;
  }

  /* ===== MAIN CONTENT ===== */
  .main{
    flex:1;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:12px;
    max-width:480px;
    width:100%;
    margin:0 auto;
  }

  /* ===== SEARCH CARD ===== */
  .search-card{
    background:var(--surface);
    border-radius:var(--radius);
    padding:14px;
    box-shadow:var(--shadow);
  }
  .search-label{
    font-size:12px;font-weight:600;color:var(--muted);
    text-transform:uppercase;letter-spacing:.6px;
    margin-bottom:8px;display:block;
  }
  .search-row{
    display:flex;gap:8px;
  }
  #searchInput{
    flex:1;
    padding:13px 14px;
    font-size:16px;
    font-family:inherit;
    border-radius:10px;
    border:1.5px solid var(--border);
    background:#f8fafc;
    color:var(--text);
    outline:none;
    transition:border .2s;
  }
  #searchInput:focus{border-color:var(--accent2)}
  .btn-icon{
    width:50px;height:50px;
    border:none;border-radius:10px;
    background:var(--header);
    color:#fff;font-size:20px;
    cursor:pointer;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    transition:background .2s;
  }
  .btn-icon:active{background:#1e3a5f}
  .btn-search{background:var(--accent2)}
  .btn-search:active{background:#0284c7}

  /* ===== CAMERA ===== */
  #cameraContainer{
    border-radius:var(--radius);
    overflow:hidden;
  }
  #cameraContainer:not(:empty){
    background:#000;
    box-shadow:var(--shadow);
  }

  /* ===== RESULT CARD ===== */
  .result-card{
    background:var(--surface);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:var(--shadow);
    animation:fadeUp .25s ease;
  }
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(12px)}
    to{opacity:1;transform:translateY(0)}
  }

  .result-header{
    background:var(--header);
    padding:14px 16px;
    color:#fff;
  }
  .result-name{font-size:18px;font-weight:700;line-height:1.3}
  .result-code{font-size:12px;color:#94a3b8;margin-top:3px}

  /* usage pill */
  .usage-box{
    background:rgba(245,156,10,.1);
    border:1px solid rgba(245,156,10,.3);
    border-radius:8px;
    padding:8px 12px;
    margin:12px 16px 0;
    font-size:13px;
    color:#92400e;
    display:flex;gap:7px;align-items:flex-start;
  }
  .usage-box .icon{flex-shrink:0;font-size:15px;margin-top:1px}

  .prices-row{
    display:grid;grid-template-columns:1fr 1fr;
    gap:8px;padding:12px 16px;
  }
  .price-chip{
    background:var(--bg);
    border-radius:10px;
    padding:10px 12px;
    text-align:center;
  }
  .price-chip .label{font-size:11px;color:var(--muted);font-weight:500}
  .price-chip .value{font-size:19px;font-weight:700;margin-top:2px}
  .price-chip.single .value{color:var(--green)}
  .price-chip.whole  .value{color:var(--accent2)}

  .stock-header{
    padding:6px 16px;
    font-size:12px;font-weight:600;color:var(--muted);
    text-transform:uppercase;letter-spacing:.5px;
    border-top:1px solid var(--border);
    display:flex;justify-content:space-between;align-items:center;
  }
  .stock-total{
    background:var(--header);
    color:#fff;
    border-radius:20px;
    padding:2px 10px;
    font-size:12px;font-weight:600;
  }

  .stock-table{width:100%;border-collapse:collapse}
  .stock-table td{
    padding:10px 16px;
    font-size:14px;
    border-top:1px solid var(--border);
  }
  .stock-table td:last-child{
    text-align:left;
    font-weight:600;
    color:var(--text);
  }
  .wh-name{color:var(--muted)}

  /* ===== FORM ===== */
  .form-card{
    background:var(--surface);
    border-radius:var(--radius);
    padding:16px;
    box-shadow:var(--shadow);
    animation:fadeUp .25s ease .1s both;
  }
  .form-title{
    font-size:13px;font-weight:600;color:var(--muted);
    text-transform:uppercase;letter-spacing:.5px;
    margin-bottom:12px;
  }
  .form-grid{display:flex;flex-direction:column;gap:9px}
  .form-row{display:flex;gap:8px}

  .field{
    display:flex;
    flex-direction:column;
    flex:1;gap:4px;
  }
  .field label{font-size:12px;color:var(--muted);font-weight:500}
  .field input{
    padding:11px 12px;
    font-size:15px;
    font-family:inherit;
    border:1.5px solid var(--border);
    border-radius:9px;
    background:#f8fafc;
    color:var(--text);
    outline:none;
    transition:border .2s;
  }
  .field input:focus{border-color:var(--accent2);background:#fff}
  .field input[readonly]{color:var(--muted);background:#f1f5f9}

  .btn-send{
    width:100%;
    padding:14px;
    font-size:16px;
    font-weight:600;
    font-family:inherit;
    background:var(--green);
    color:#fff;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-top:4px;
    transition:background .2s,transform .1s;
  }
  .btn-send:active{transform:scale(.98)}
  .btn-send:disabled{background:#94a3b8}

  /* ===== STATES ===== */
  .state-box{
    background:var(--surface);
    border-radius:var(--radius);
    padding:32px 16px;
    text-align:center;
    box-shadow:var(--shadow);
  }
  .state-box .ico{font-size:40px;margin-bottom:8px}
  .state-box p{color:var(--muted);font-size:15px}
  .state-box.err .ico{color:#ef4444}
  .state-box.err p{color:#ef4444}
</style>
</head>
<body>

<!-- ====== HEADER ====== -->
<header class="app-header">
  <div class="logo">
    <div class="logo-icon">M</div>
    <div class="logo-text">
      <span class="logo-name">MAWARAN</span>
      <span class="logo-sub">Inventory Store</span>
    </div>
  </div>
  <button id="installBtn" onclick="triggerInstall()">⬇ تثبيت</button>
</header>

<!-- ====== INSTALL BANNER (iOS) ====== -->
<div id="installBanner">
  <div class="banner-icon">📲</div>
  <div class="banner-text">
    <strong>تثبيت التطبيق</strong>
    اضغط <strong>Share ↑</strong> ثم <strong>"Add to Home Screen"</strong> لتثبيته كتطبيق
  </div>
  <button class="banner-close" onclick="dismissBanner()">✕</button>
</div>

<!-- ====== MAIN ====== -->
<main class="main">

  <!-- Search -->
  <div class="search-card">
    <span class="search-label">🔎 بحث بالرمز أو الباركود</span>
    <div class="search-row">
      <input id="searchInput" type="text" placeholder="أدخل الرمز...">
      <button class="btn-icon btn-search" id="searchButton" title="بحث">🔍</button>
      <button class="btn-icon" id="scanButton" title="كاميرا">📷</button>
    </div>
  </div>

  <!-- Camera -->
  <div id="cameraContainer"></div>

  <!-- Result -->
  <div id="result"></div>

</main>

<script>
const API = "https://script.google.com/macros/s/AKfycbwnbBlthWzZNykVVVMWMTiy7CITXXDBc7z31QIsoEPRZ-9tFfXHBh04uEvWqncnW7KH/exec";

const input      = document.getElementById("searchInput");
const resultDiv  = document.getElementById("result");
let html5QrCode;
let isSending    = false;
let deferredPrompt = null;

/* ── PWA install logic ── */
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("installBtn").classList.add("visible");
});

function triggerInstall(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById("installBtn").classList.remove("visible");
  });
}

// iOS: show banner if not already installed
const isIOS     = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone;
if(isIOS && !isStandalone && !sessionStorage.getItem("bannerDismissed")){
  document.getElementById("installBanner").classList.add("visible");
}
function dismissBanner(){
  document.getElementById("installBanner").classList.remove("visible");
  sessionStorage.setItem("bannerDismissed","1");
}

/* ── Focus without keyboard ── */
function focusNoKB(){
  input.setAttribute("readonly","true");
  input.focus();
  setTimeout(()=>input.removeAttribute("readonly"),50);
}
window.onload = focusNoKB;

/* ── Search ── */
async function searchStock(code){
  if(!code) return;
  resultDiv.innerHTML = `
    <div class="state-box">
      <div class="ico">⏳</div>
      <p>جاري البحث...</p>
    </div>`;

  try{
    const res  = await fetch(`${API}?code=${encodeURIComponent(code)}`);
    const data = await res.json();

    if(!data || !data.items || !data.items.length){
      resultDiv.innerHTML = `
        <div class="state-box err">
          <div class="ico">❌</div>
          <p>لا توجد بيانات لهذا الرمز</p>
        </div>`;
      resetInput();
      return;
    }

    let total = 0;
    data.items.forEach(i => total += Number(i.balance)||0);

    /* prices */
    let html = `
      <div class="result-card">
        <div class="result-header">
          <div class="result-name">${data.name}</div>
          <div class="result-code">رمز: ${code.toUpperCase()}</div>
        </div>`;

    /* usage */
    if(data.usage){
      html += `
        <div class="usage-box">
          <span class="icon">📋</span>
          <span>${data.usage}</span>
        </div>`;
    }

    html += `
        <div class="prices-row">
          <div class="price-chip single">
            <div class="label">سعر المفرد</div>
            <div class="value">${data.price_single} $</div>
          </div>
          <div class="price-chip whole">
            <div class="label">آخر سعر</div>
            <div class="value">${data.price_wholesale} $</div>
          </div>
        </div>

        <div class="stock-header">
          <span>المستودعات</span>
          <span class="stock-total">📦 ${total}</span>
        </div>
        <table class="stock-table">`;

    data.items.forEach(i=>{
      html += `<tr>
        <td class="wh-name">${i.warehouse}</td>
        <td>${i.balance}</td>
      </tr>`;
    });

    html += `</table></div>

    <div class="form-card">
      <div class="form-title">📤 إضافة حركة</div>
      <div class="form-grid">
        <div class="field">
          <label>الرمز</label>
          <input id="f_code" value="${data.form_code}" readonly>
        </div>
        <div class="form-row">
          <div class="field">
            <label>الكمية</label>
            <input id="f_qty" type="number" inputmode="numeric" placeholder="0">
          </div>
          <div class="field">
            <label>السعر</label>
            <input id="f_price" type="number" inputmode="decimal" placeholder="0.00">
          </div>
        </div>
        <button class="btn-send" onclick="sendForm(event)">📤 إرسال</button>
      </div>
    </div>`;

    resultDiv.innerHTML = html;
    resetInput();

  }catch(err){
    resultDiv.innerHTML = `
      <div class="state-box err">
        <div class="ico">⚠️</div>
        <p>خطأ في الاتصال</p>
      </div>`;
    resetInput();
  }
}

function resetInput(){
  input.value = "";
  setTimeout(focusNoKB, 30);
}

function resetAll(){
  resultDiv.innerHTML = "";
  input.value = "";
  if(html5QrCode){ try{ html5QrCode.stop(); }catch(e){} }
  document.getElementById("cameraContainer").innerHTML = "";
  setTimeout(focusNoKB, 100);
}

/* ── Events ── */
input.addEventListener("keydown", e=>{
  if(e.key==="Enter") searchStock(input.value.trim());
});
document.getElementById("searchButton").onclick = ()=> searchStock(input.value.trim());

/* ── Camera (back-facing) ── */
document.getElementById("scanButton").onclick = startScanner;

async function startScanner(){
  if(html5QrCode){
    try{ await html5QrCode.stop(); }catch(e){}
  }
  html5QrCode = new Html5Qrcode("cameraContainer");

  try{
    /* 1️⃣ Try back camera via facingMode constraint */
    await html5QrCode.start(
      { facingMode: { ideal: "environment" } },
      { fps:12, qrbox:{ width:240, height:240 } },
      txt => {
        html5QrCode.stop().catch(()=>{});
        document.getElementById("cameraContainer").innerHTML="";
        searchStock(txt);
      }
    );
  }catch(err){
    /* 2️⃣ Fallback: list cameras and pick last one (usually back) */
    try{
      const cams = await Html5Qrcode.getCameras();
      const camId = cams[cams.length-1].id; // last = rear on most phones
      await html5QrCode.start(
        camId,
        { fps:12, qrbox:{ width:240, height:240 } },
        txt => {
          html5QrCode.stop().catch(()=>{});
          document.getElementById("cameraContainer").innerHTML="";
          searchStock(txt);
        }
      );
    }catch(e2){
      alert("⚠️ تعذّر فتح الكاميرا: " + e2);
    }
  }
}

/* ── Send form ── */
async function sendForm(e){
  if(isSending) return;
  const qty   = document.getElementById("f_qty")?.value;
  const price = document.getElementById("f_price")?.value;
  const code  = document.getElementById("f_code")?.value;
  const btn   = e.target;

  if(!qty || !price){ alert("⚠️ أدخل الكمية والسعر"); return; }

  isSending = true;
  btn.disabled = true;
  btn.innerText = "⏳ جاري الإرسال...";

  try{
    await fetch(API,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({code,qty,price})
    });
    alert("✅ تواو ده ست خوش");
    resetAll();
  }catch(err){
    alert("❌ فشل الإرسال، حاول مجدداً");
    btn.disabled = false;
    btn.innerText = "📤 إرسال";
  }finally{
    isSending = false;
  }
}
</script>
</body>
</html>
