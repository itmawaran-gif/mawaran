<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Low Stock</title>
<style>
body{font-family:Arial,sans-serif;background:#111;color:#fff;padding:20px}
.item{padding:15px;border-bottom:1px solid #333;margin-bottom:5px}
.item:hover{background:#222}
.small{color:#aaa;font-size:12px}
.red{color:#ff4d4d;font-weight:700}
.loading{color:#0af;font-size:14px;margin-bottom:10px}
</style>
</head>
<body>
<h2>⚠️ Low Stock (Showroom < 8)</h2>
<div id="list" class="loading">جارٍ التحميل...</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyY7CVhKqR4br_llNb3ipClNlGv6iwtXAzMDOy3in9-CgTIw_zg6HyGC8Hgp0ZcG-NY1A/exec"; // ضع رابط الـ Web App الجديد هنا

async function load(){
  const listDiv = document.getElementById("list");
  listDiv.innerHTML = "جارٍ التحميل...";

  try{
    const res = await fetch(API);
    if(!res.ok) throw new Error("خطأ في الاتصال بالـ API");
    const data = await res.json();
    
    if(data.length === 0){
      listDiv.innerHTML = "لا توجد منتجات منخفضة المخزون.";
      return;
    }

    let html = "";
    data.forEach(p=>{
      html += `<div class="item">
        <b>${p.name}</b><br>
        <span class="small">Code: ${p.code} | Showroom: <span class="red">${p.showroom}</span></span><br>
        <span class="small">Other Warehouses: ${p.other}</span>
      </div>`;
    });

    listDiv.innerHTML = html;

  }catch(err){
    listDiv.innerHTML = "حدث خطأ أثناء التحميل: " + err.message;
  }
}

load();
</script>
</body>
</html>
